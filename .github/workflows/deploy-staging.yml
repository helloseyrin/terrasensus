name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy-ingestion:
    name: Deploy ingestion service
    runs-on: ubuntu-latest
    env:
      GCP_REGION: europe-west2
      IMAGE_TAG: ${{ github.sha }}
      GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build and push
        run: gcloud builds submit services/ingestion --tag gcr.io/$GCP_PROJECT/terrasensus-ingestion:$IMAGE_TAG
      - name: Deploy to Cloud Run staging
        run: |
          gcloud run deploy terrasensus-ingestion-staging \
            --image gcr.io/$GCP_PROJECT/terrasensus-ingestion:$IMAGE_TAG \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated

  deploy-alert-engine:
    name: Deploy alert-engine service
    runs-on: ubuntu-latest
    env:
      GCP_REGION: europe-west2
      IMAGE_TAG: ${{ github.sha }}
      GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build and push
        run: gcloud builds submit services/alert-engine --tag gcr.io/$GCP_PROJECT/terrasensus-alert-engine:$IMAGE_TAG
      - name: Deploy to Cloud Run staging
        run: |
          gcloud run deploy terrasensus-alert-engine-staging \
            --image gcr.io/$GCP_PROJECT/terrasensus-alert-engine:$IMAGE_TAG \
            --region $GCP_REGION \
            --platform managed \
            --no-allow-unauthenticated
