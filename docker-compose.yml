version: "3.9"

# TerraSensus — Local Development Stack
# Mirrors the GCP production topology without needing cloud credentials.
# Usage: docker-compose up

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: terrasensus
      POSTGRES_USER: terrasensus
      POSTGRES_PASSWORD: terrasensus_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terrasensus"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingestion:
    build: ./services/ingestion
    ports:
      - "8001:8080"
    environment:
      DATABASE_URL: postgresql://terrasensus:terrasensus_dev@postgres:5432/terrasensus
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  alert-engine:
    build: ./services/alert-engine
    ports:
      - "8002:8080"
    environment:
      DATABASE_URL: postgresql://terrasensus:terrasensus_dev@postgres:5432/terrasensus
      ENV: development
      # FCM alerts are no-op in development
      FIREBASE_DISABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy

  ai-recommendations:
    build: ./services/ai-recommendations
    ports:
      - "8003:8080"
    environment:
      ENV: development
      # Set GOOGLE_APPLICATION_CREDENTIALS to use real Vertex AI,
      # or leave unset to use stub responses in development
      VERTEX_AI_PROJECT: ""
      VERTEX_AI_LOCATION: europe-west2

  lab-parser:
    build: ./services/lab-parser
    ports:
      - "8004:8080"
    environment:
      ENV: development
      GCS_BUCKET: terrasensus-lab-reports-dev

  simulator:
    build: ./simulator
    environment:
      ENV: development
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
    depends_on:
      - ingestion
    command: python sensor_simulator.py

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@terrasensus.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
